services:
  # --- Agent Zero ---
  # Если A0 уже запущен отдельно — удалите этот сервис и пропишите его адрес в A0_URL.
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: a0
    restart: unless-stopped
    ports:
      - "50080:80"   # доступ к WebUI с хоста: http://localhost:50080
    volumes:
      - a0_usr:/a0/usr   # ВАЖНО: только /a0/usr, не весь /a0 (это рекомендация Agent Zero)
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - a0net

  # --- наш MCP-сервер ---
  a0-mcp:
    build: .
    container_name: a0-mcp
    restart: unless-stopped
    depends_on:
      - agent-zero
    ports:
      - "8765:8765"  # MCP endpoint: http://localhost:8765/mcp
    env_file:
      - .env
    # A0_URL берётся из .env. Внутри docker network — http://agent-zero:80;
    # если A0 снаружи, укажите его адрес с портом external API прямо в .env.
    networks:
      - a0net

networks:
  a0net:
    driver: bridge

volumes:
  a0_usr:
